<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 로또 추천 - 행운의 번호를 만나보세요</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="noise-overlay"></div>
  
  <header>
    <div class="container">
      <h1>Lotto <span class="highlight">Lucky</span></h1>
      <p>오늘의 행운을 잡으세요. 당신의 번호를 추천해 드립니다.</p>
    </div>
  </header>

  <main class="container">
    <section id="generator-section">
      <lotto-generator></lotto-generator>
    </section>

    <section id="history-section">
      <h2>최근 생성된 번호</h2>
      <div id="history-list">
        <!-- History items will be injected here -->
        <p class="empty-msg">아직 생성된 번호가 없습니다.</p>
      </div>
      <button id="clear-history" class="secondary-btn">기록 삭제</button>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Lotto Lucky. All rights reserved.</p>
    </div>
  </footer>

  <script defer type="module" src="/main.js"></script>
</body>
</html>
